async function requestWakeLock() {
  try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch(e) {}
}
async function releaseWakeLock() { if (wakeLock) { await wakeLock.release(); wakeLock = null; } }

async function sendTelegram(message) {
  try {
    await fetch("https://api.telegram.org/bot" + TELEGRAM_TOKEN + "/sendMessage", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "HTML" })
    });
  } catch(e) {}
}

async function addNotification(type, message, catId, recipeId) {
  try {
    await db.collection("notifications").add({ type: type, message: message, catId: catId, recipeId: recipeId, read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    var url = SITE_URL + "?cat=" + catId + "&recipe=" + recipeId;
    await sendTelegram("🍽️ <b>ספר המתכונים</b>\n\n" + message + "\n\n<a href=\"" + url + "\">לחץ לצפייה במתכון</a>");
  } catch(e) {}
}

function listenNotifications() {
  document.getElementById("notifBtn").style.display = "block";
  if (unsubNotif) unsubNotif();
  unsubNotif = db.collection("notifications").orderBy("createdAt", "desc").onSnapshot(function(snap) {
    notifications = [];
    snap.forEach(function(d) { notifications.push(Object.assign({ id: d.id }, d.data())); });
    var unread = notifications.filter(function(n) { return !n.read; }).length;
    var badge = document.getElementById("notifBadge");
    badge.textContent = unread;
    badge.style.display = unread > 0 ? "flex" : "none";
    renderNotifList();
  });
}

function renderNotifList() {
  var el = document.getElementById("notifList");
  if (!notifications.length) { el.innerHTML = '<div class="notif-empty">אין התראות עדיין</div>'; return; }
  el.innerHTML = notifications.slice(0,30).map(function(n) {
    var date = n.createdAt && n.createdAt.toDate ? n.createdAt.toDate().toLocaleDateString("he-IL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}) : "";
    return '<div class="notif-wrapper" id="wrapper-' + n.id + '">' +
      '<button class="notif-delete-btn" onclick="deleteNotif(\'' + n.id + '\')">🗑️<br>מחק</button>' +
      '<div class="notif-item ' + (n.read?'':'unread') + '" id="notif-' + n.id + '">' +
      '<div style="font-size:14px;margin-bottom:4px" onclick="goToNotif(\'' + n.id + '\',\'' + n.catId + '\',\'' + n.recipeId + '\')">' + n.message + '</div>' +
      '<div style="font-size:12px;color:#6b7280">' + date + '</div>' +
      '</div></div>';
  }).join("");

  notifications.slice(0,30).forEach(function(n) {
    var item = document.getElementById("notif-" + n.id);
    if (!item) return;
    var startX = 0;
    item.addEventListener("touchstart", function(e) { startX = e.touches[0].clientX; }, { passive: true });
    item.addEventListener("touchmove", function(e) {
      var diff = startX - e.touches[0].clientX;
      if (diff > 10) item.style.transform = "translateX(-" + Math.min(diff,75) + "px)";
      else if (diff < -5) item.style.transform = "translateX(0)";
    }, { passive: true });
    item.addEventListener("touchend", function() {
      var x = Math.abs(parseFloat(item.style.transform.replace(/[^\d.-]/g,"")) || 0);
      item.style.transform = x > 40 ? "translateX(-75px)" : "translateX(0)";
    });
  });
}

function deleteNotif(notifId) {
  db.collection("notifications").doc(notifId).delete().then(function() {
    notifications = notifications.filter(function(n) { return n.id !== notifId; });
    var unread = notifications.filter(function(n) { return !n.read; }).length;
    var badge = document.getElementById("notifBadge");
    badge.textContent = unread;
    badge.style.display = unread > 0 ? "flex" : "none";
    renderNotifList();
  });
}

function goToNotif(notifId, catId, recipeId) {
  db.collection("notifications").doc(notifId).update({ read: true });
  document.getElementById("notifPanel").classList.remove("open");
  currentCategory = catId; showRecipe(recipeId);
}

function toggleNotifPanel() { document.getElementById("notifPanel").classList.toggle("open"); }

async function loadFavorites() {
  if (!currentUser) { userFavorites = []; return; }
  try {
    var d = await db.collection("favorites").doc(currentUser.uid).get();
    userFavorites = d.exists ? (d.data().list || []) : [];
  } catch(e) { userFavorites = []; }
}

async function toggleFavorite(recipeId, catId, recipeName) {
  if (!currentUser) { alert("יש להתחבר כדי לשמור מועדפים"); return; }
  var isFav = userFavorites.some(function(f) { return f.id === recipeId; });
  userFavorites = isFav ? userFavorites.filter(function(f) { return f.id !== recipeId; }) : userFavorites.concat([{ id: recipeId, cat: catId }]);
  await db.collection("favorites").doc(currentUser.uid).set({ list: userFavorites });
  if (!isFav && recipeName) await addNotification("like", "❤️ " + (currentUser.displayName || "מישהו") + " אהב את \"" + recipeName + "\"", catId, recipeId);
  return !isFav;
}

function signInWithApple() {
  var provider = new firebase.auth.OAuthProvider('apple.com');
  provider.addScope('email');
  provider.addScope('name');
  auth.signInWithPopup(provider).catch(function(e) {
    if (e.code !== "auth/popup-closed-by-user" && e.code !== "auth/cancelled-popup-request") {
      alert("שגיאה: " + e.message);
    }
  });
}

function signInWithGoogle() {
  var provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });
  auth.signInWithPopup(provider).catch(function(e) {
    if (e.code !== "auth/popup-closed-by-user" && e.code !== "auth/cancelled-popup-request") {
      alert("שגיאה: " + e.message);
    }
  });
}

function viewOnlyMode() { isViewOnly = true; showHome(); }

function signOutUser() {
  if (unsubNotif) unsubNotif();
  auth.signOut();
  isViewOnly = false; isAdmin = false; userFavorites = [];
  document.getElementById("notifBtn").style.display = "none";
  document.getElementById("logoutBtn").style.display = "none";
  document.getElementById("backBtn").style.display = "none";
  document.getElementById("headerSub").textContent = "";
  showPage("loginPage");
}

auth.onAuthStateChanged(async function(user) {
  currentUser = user;
  if (user && user.uid === ADMIN_UID) {
    isAdmin = true; isViewOnly = false;
    document.getElementById("logoutBtn").style.display = "block";
    document.getElementById("headerSub").textContent = "מנהל: " + user.displayName;
    await loadFavorites();
    listenNotifications();
    if (!checkDeepLink()) showHome();
  } else if (user) {
    isAdmin = false; isViewOnly = false;
    document.getElementById("logoutBtn").style.display = "block";
    document.getElementById("headerSub").textContent = user.displayName;
    await loadFavorites();
    if (!checkDeepLink()) showHome();
  } else {
    if (!isViewOnly) showPage("loginPage");
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("notifBtn").style.display = "none";
  }
});

document.addEventListener("click", function(e) {
  if (!e.target.closest(".dots-menu")) document.querySelectorAll(".dots-dropdown").forEach(function(d) { d.classList.remove("open"); });
  if (!e.target.closest("#notifBtn") && !e.target.closest("#notifPanel")) document.getElementById("notifPanel").classList.remove("open");
});

async function loadAllRecipes() {
  allRecipes = [];
  for (var i = 0; i < CATEGORIES.length; i++) {
    var cat = CATEGORIES[i];
    var snap = await db.collection(cat.id).get();
    snap.forEach(function(d) { allRecipes.push(Object.assign({ id: d.id, catId: cat.id }, d.data())); });
  }
}

function showHome() {
  document.getElementById("backBtn").style.display = "none";
  backFn = null;
  if (!currentUser && isViewOnly) {
    document.getElementById("headerSub").textContent = "צפייה בלבד";
    document.getElementById("logoutBtn").style.display = "block";
  } else if (!currentUser) {
    document.getElementById("logoutBtn").style.display = "none";
  }

  var el = document.getElementById("homePage");

  el.innerHTML = '<div style="text-align:center;margin-bottom:24px"><h2 style="font-family:\'David\',serif;font-size:28px;margin-bottom:8px">ברוכים הבאים</h2><p class="sub-text">בחר קטגוריה לצפייה במתכונים</p></div>' +
    '<div class="search-bar"><input class="search-input" placeholder="🔍 חפש מתכון..." id="searchInput" dir="rtl" oninput="debouncedSearch(this.value)"></div>' +
    favBtn +
    CATEGORIES.map(function(c) {
      return '<div class="card" onclick="showCategory(\'' + c.id + '\')" style="background:' + getCatBg(c) + ';border-color:' + c.color + '44;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:18px;font-weight:700;color:' + c.color + ';font-family:\'David\',serif">' + c.label + '</div><div class="sub-text" style="font-size:13px;margin-top:3px" id="count-' + c.id + '">טוען...</div></div><span style="color:' + c.color + ';font-size:20px">←</span></div>';
    }).join("");
  showPage("homePage");
  CATEGORIES.forEach(async function(c) {

function debouncedSearch(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) return;
  searchTimer = setTimeout(function() { handleSearch(val); }, 1200);
}

function handleSearch(val) {
  var term = val.trim().toLowerCase();
  var results = allRecipes.filter(function(r) {
    return (r.name||"").toLowerCase().includes(term) || (r.ingredients||"").toLowerCase().includes(term) || (r.instructions||"").toLowerCase().includes(term);
  });
  document.getElementById("backBtn").style.display = "block";
  backFn = showHome;
  var el = document.getElementById("searchPage");
  el.innerHTML = '<div class="search-bar" style="margin-bottom:16px"><input class="search-input" placeholder="🔍 חפש מתכון..." id="searchInput2" dir="rtl" value="' + val + '" oninput="debouncedSearch(this.value)"></div>' +
    '<p class="sub-text" style="font-size:14px;margin-bottom:20px">חיפשת: "<strong>' + val + '</strong>" — ' + results.length + ' תוצאות</p>' +
    (results.length === 0 ? '<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">🔍</div><p class="sub-text">לא נמצאו מתכונים</p></div>' :
      results.map(function(r) {
        var cat = CATEGORIES.find(function(c) { return c.id === r.catId; });
        return '<div style="background:' + getCatBg(cat) + ';border-radius:12px;padding:16px;border:1px solid ' + cat.color + '44;margin-bottom:12px;cursor:pointer" onclick="currentCategory=\'' + r.catId + '\';showRecipe(\'' + r.id + '\')"><div style="font-weight:600;font-size:16px">' + r.name + '</div><div style="color:' + cat.color + ';font-size:12px;margin-top:4px">' + cat.label + '</div></div>';
      }).join(""));
  showPage("searchPage");
  var inp2 = document.getElementById("searchInput2");
  if (inp2) { inp2.focus(); inp2.setSelectionRange(inp2.value.length, inp2.value.length); }
}

    (favRecipes.length === 0 ? '<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">❤️</div><p class="sub-text">עדיין לא שמרת מועדפים</p></div>' :
      favRecipes.map(function(r) {

async function handleHeart(recipeId, catId, recipeName, btn) {

function toggleMenu(id, e) {

  var d = await db.collection(currentCategory).doc(recipeId).get();

  var recipe = Object.assign({ id: d.id }, d.data());
  currentRecipe = recipe;
  document.getElementById("backBtn").style.display = "block";
  backFn = function() { showCategory(currentCategory); };
  var comments = recipe.comments || [];
  var avg = comments.length > 0 ? (comments.reduce(function(s,c){return s+c.rating;},0)/comments.length).toFixed(1) : null;
  var isFav = userFavorites.some(function(f) { return f.id === recipeId; });
  var diffMap = {"קל 🟢":"#16a34a","בינוני 🟡":"#ca8a04","קשה 🔴":"#dc2626"};

    '</div></div>' +

async function handleRecipeHeart(recipeId, catId, recipeName) {
  var isFav = await toggleFavorite(recipeId, catId, recipeName);
  var btn = document.getElementById("recipeHeart");
  if (btn) btn.textContent = isFav ? '❤️' : '🤍';
}

function shareWhatsapp(recipeId) {
  var url = SITE_URL + "?cat=" + currentCategory + "&recipe=" + recipeId;
  var text = "בוא תראה את המתכון \"" + currentRecipe.name + "\" בספר המתכונים של גיא שלומי! 🍽️\n" + url;
  window.open("https://wa.me/?text=" + encodeURIComponent(text), '_blank');
}

async function toggleWakeLock() {
  if (wakeLock) { await releaseWakeLock(); } else { await requestWakeLock(); }
  var btn = document.getElementById("wakeBtn");
  if (btn) { btn.className = "wakelock-btn" + (wakeLock?' active':''); btn.textContent = wakeLock ? '🔆 דולק' : '💡 שמור דולק'; }
}

function setRating(n) {
  selectedRating = n;
  document.querySelectorAll(".star").forEach(function(s) { s.classList.toggle("active", parseInt(s.dataset.star) <= n); });
}

async function submitComment(recipeId, recipeName) {
  var text = document.getElementById("commentText").value.trim();
  if (!text || selectedRating === 0) { alert("נא למלא תגובה ודירוג"); return; }
  var user = document.getElementById("commentUser").value.trim() || "אנונימי";
  var comments = (currentRecipe.comments||[]).concat([{ user: user, text: text, rating: selectedRating }]);
  await db.collection(currentCategory).doc(recipeId).update({ comments: comments });
  await addNotification("comment", "💬 " + user + " הגיב על \"" + recipeName + "\": \"" + text.slice(0,40) + "\" ⭐" + selectedRating, currentCategory, recipeId);
  currentRecipe.comments = comments; selectedRating = 0;
  showRecipe(recipeId);
}

async function deleteComment(recipeId, index) {
  if (!confirm("האם אתה בטוח שברצונך למחוק תגובה זו?")) return;
  var comments = (currentRecipe.comments||[]).slice();
  comments.splice(index, 1);
  await db.collection(currentCategory).doc(recipeId).update({ comments: comments });
  currentRecipe.comments = comments;
  showRecipe(recipeId);
}

async function showForm(recipeId) {
  var cat = CATEGORIES.find(function(c) { return c.id === currentCategory; });
  var editingRecipe = null, name = "", ingredients = "", instructions = "";
  if (recipeId) {
    var d = await db.collection(currentCategory).doc(recipeId).get();
    if (d.exists) { editingRecipe = Object.assign({id:d.id},d.data()); name=editingRecipe.name; ingredients=editingRecipe.ingredients; instructions=editingRecipe.instructions; }
  }
  var savedDiff = editingRecipe && editingRecipe.difficulty ? editingRecipe.difficulty : "";
  backFn = function() { showCategory(currentCategory); };
  document.getElementById("formPage").innerHTML = '<div class="recipe-card" style="border-radius:16px;border:1px solid ' + cat.color + '55;padding:24px">' +
    '<h2 style="color:' + cat.color + ';font-family:\'David\',serif;font-size:22px;margin-bottom:20px">' + (recipeId?"✏️ עריכת מתכון":"✍️ הוספת מתכון חדש") + '</h2>' +
    '<label class="label">שם המתכון *</label><input id="fName" class="input-field" value="' + name + '" placeholder="לדוג׳: פסטה בולונז" dir="rtl">' +
    '<div style="display:flex;gap:12px;margin-bottom:12px"><div style="flex:1"><label class="label">⏱️ זמן הכנה</label><input id="fTime" class="input-field" value="' + (editingRecipe&&editingRecipe.cookTime?editingRecipe.cookTime:'') + '" placeholder="למשל: 30 דק׳" dir="rtl" style="margin-bottom:0"></div>' +
    '<div style="flex:1"><label class="label">רמת קושי</label><div style="display:flex;gap:6px;margin-top:4px">' +
    ["קל 🟢","בינוני 🟡","קשה 🔴"].map(function(d){return '<button type="button" class="diff-btn' + (savedDiff===d?' selected':'') + '" data-diff="' + d + '" onclick="selectDiff(this)">' + d + '</button>';}).join('') +
    '</div></div></div>' +
    '<label class="label">מצרכים *</label><textarea id="fIngredients" class="input-field" placeholder="ציין את כל המצרכים..." rows="4" style="height:100px;resize:vertical" dir="rtl">' + ingredients + '</textarea>' +
    '<label class="label">אופן הכנה *</label><textarea id="fInstructions" class="input-field" placeholder="תאר את שלבי ההכנה..." rows="5" style="height:130px;resize:vertical" dir="rtl">' + instructions + '</textarea>' +
    '<button class="btn btn-primary" onclick="saveRecipe(\'' + (recipeId||"") + '\')" style="width:100%;padding:14px;font-size:16px;border-radius:10px;margin-top:4px">💾 ' + (recipeId?"שמור שינויים":"שמור מתכון") + '</button></div>';
  showPage("formPage");
}

function selectDiff(btn) {
  document.querySelectorAll(".diff-btn").forEach(function(b) { b.classList.remove("selected"); });
  btn.classList.add("selected");
}

async function saveRecipe(recipeId) {
  var name = document.getElementById("fName").value.trim();
  var ingredients = document.getElementById("fIngredients").value.trim();
  var instructions = document.getElementById("fInstructions").value.trim();
  var cookTime = document.getElementById("fTime").value.trim();
  var diffBtn = document.querySelector(".diff-btn.selected");
  var difficulty = diffBtn ? diffBtn.dataset.diff : "";
  if (!name||!ingredients||!instructions) { alert("נא למלא את כל השדות"); return; }
  var data = { name: name, ingredients: ingredients, instructions: instructions, cookTime: cookTime, difficulty: difficulty };
  if (recipeId) { await db.collection(currentCategory).doc(recipeId).update(data); }
  else { await db.collection(currentCategory).add(Object.assign(data, { comments: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() })); }
  showCategory(currentCategory);
}

function openDeleteModal(id, name) {
  deleteTargetId = id;
  document.getElementById("deleteRecipeName").textContent = name;
  document.getElementById("deleteModal").style.display = "flex";
}
function closeDeleteModal() { document.getElementById("deleteModal").style.display = "none"; deleteTargetId = null; }
async function confirmDelete() {
  await db.collection(currentCategory).doc(deleteTargetId).delete();
  closeDeleteModal(); showCategory(currentCategory);
}
</script>
</body>
</html>
