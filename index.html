// CLOCK
function tick(){
  var n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');
  var ct=document.getElementById("cT"),cl=document.getElementById("cL"),ch=document.getElementById("cH");
  if(ct)ct.textContent=h+":"+m+":"+s;
  if(cl)cl.textContent=n.toLocaleDateString("he-IL",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  if(ch)try{ch.textContent=n.toLocaleDateString("he-IL-u-ca-hebrew",{weekday:"long",year:"numeric",month:"long",day:"numeric"});}catch(e){}
}
tick();setInterval(tick,1000);

async function reqWL(){try{if('wakeLock'in navigator){wl=await navigator.wakeLock.request('screen');}}catch(e){}}

async function addNotif(type,msg,catId,rid){
  try{
    await db.collection("notifications").add({type:type,message:msg,catId:catId,recipeId:rid,read:false,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await tg("🍽️ <b>ספר המתכונים</b>\n\n"+msg+"\n\n<a href=\""+SITE+"?cat="+catId+"&recipe="+rid+"\">לחץ לצפייה במתכון</a>");
  }catch(e){}
}

function listenNotifs(){
  document.getElementById("nBtn").style.display="block";
  if(unsub)unsub();
  unsub=db.collection("notifications").orderBy("createdAt","desc").onSnapshot(function(snap){
    notifs=[];snap.forEach(function(d){notifs.push(Object.assign({id:d.id},d.data()));});
    var u=notifs.filter(function(n){return !n.read;}).length;
    var b=document.getElementById("nBadge");b.textContent=u;b.style.display=u>0?"flex":"none";
    renderNotifs();
  });
}

function renderNotifs(){
  var el=document.getElementById("nList");
  if(!notifs.length){el.innerHTML='<div class="nempty">אין התראות עדיין</div>';return;}
  el.innerHTML=notifs.slice(0,30).map(function(n){
    var dt=n.createdAt&&n.createdAt.toDate?n.createdAt.toDate().toLocaleDateString("he-IL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"";
    return'<div class="nwrap"><button class="ndel" onclick="delNotif(\''+n.id+'\')">🗑️<br>מחק</button><div class="nitem '+(n.read?'':'unread')+'" id="ni-'+n.id+'"><div style="font-size:13px;margin-bottom:3px" onclick="goNotif(\''+n.id+'\',\''+n.catId+'\',\''+n.recipeId+'\')">'+n.message+'</div><div style="font-size:11px;color:#6b7280">'+dt+'</div></div></div>';
  }).join("");
  notifs.slice(0,30).forEach(function(n){
    var it=document.getElementById("ni-"+n.id);if(!it)return;
    var sx=0;
    it.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;},{passive:true});
    it.addEventListener("touchmove",function(e){var d=sx-e.touches[0].clientX;if(d>10)it.style.transform="translateX(-"+Math.min(d,70)+"px)";else if(d<-5)it.style.transform="translateX(0)";},{passive:true});
    it.addEventListener("touchend",function(){var x=Math.abs(parseFloat(it.style.transform.replace(/[^\d.-]/g,""))||0);it.style.transform=x>35?"translateX(-70px)":"translateX(0)";});
  });
}

  backFn=function(){showCat(cat);};
  document.getElementById("formPage").innerHTML='<div class="recipe-card" style="border-radius:14px;border:1px solid '+c.c+'55;padding:20px">'+
    '<h2 style="color:'+c.c+';font-family:\'David\',serif;font-size:20px;margin-bottom:16px">'+(rid?"✏️ עריכת מתכון":"✍️ הוספת מתכון חדש")+'</h2>'+
    '<label class="lbl">שם המתכון *</label><input id="fN" class="ifield" value="'+name+'" placeholder="לדוג׳: פסטה בולונז" dir="rtl">'+
    '<div style="display:flex;gap:10px;margin-bottom:10px"><div style="flex:1"><label class="lbl">⏱️ זמן הכנה</label><input id="fT" class="ifield" value="'+(er&&er.cookTime?er.cookTime:'')+'" placeholder="30 דק׳" dir="rtl" style="margin-bottom:0"></div>'+
    '<div style="flex:1"><label class="lbl">קושי</label><div style="display:flex;gap:4px;margin-top:4px">'+["קל 🟢","בינוני 🟡","קשה 🔴"].map(function(d){return'<button type="button" class="diff-btn'+(sd===d?' sel':'')+'" data-d="'+d+'" onclick="selD(this)">'+d+'</button>';}).join('')+'</div></div></div>'+
    '<label class="lbl">מצרכים *</label><textarea id="fI" class="ifield" placeholder="ציין את כל המצרכים..." rows="4" style="height:90px;resize:vertical" dir="rtl">'+ing+'</textarea>'+
    '<label class="lbl">אופן הכנה *</label><textarea id="fIn" class="ifield" placeholder="תאר את שלבי ההכנה..." rows="5" style="height:120px;resize:vertical" dir="rtl">'+inst+'</textarea>'+
    '<button class="btn btn-g" onclick="saveRec(\''+(rid||"")+'\''+')" style="width:100%;padding:12px;font-size:15px;border-radius:10px;margin-top:4px">💾 '+(rid?"שמור שינויים":"שמור מתכון")+'</button></div>';
  sp("formPage");
}

function selD(btn){document.querySelectorAll(".diff-btn").forEach(function(b){b.classList.remove("sel");});btn.classList.add("sel");}

async function saveRec(rid){
  var n=document.getElementById("fN").value.trim();
  var i=document.getElementById("fI").value.trim();
  var inst=document.getElementById("fIn").value.trim();
  var t=document.getElementById("fT").value.trim();
  var db2=document.querySelector(".diff-btn.sel");
  var d=db2?db2.dataset.d:"";
  if(!n||!i||!inst){alert("נא למלא את כל השדות");return;}
  var data={name:n,ingredients:i,instructions:inst,cookTime:t,difficulty:d};
  if(rid){await db.collection(cat).doc(rid).update(data);}
  else{await db.collection(cat).add(Object.assign(data,{comments:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()}));}
  showCat(cat);
}

function openDelModal(id,name){delId=id;document.getElementById("delName").textContent=name;document.getElementById("delModal").style.display="flex";}
function closeDelModal(){document.getElementById("delModal").style.display="none";delId=null;}
async function confirmDel(){await db.collection(cat).doc(delId).delete();closeDelModal();showCat(cat);}
</script>
</body>
</html>
