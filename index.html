.header { padding: 14px 20px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 100; }
.container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
.btn { border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-primary { background: #4ade80; color: #000; }
.btn-danger { background: #dc2626; color: #fff; }
.card { border-radius: 12px; border: 1px solid; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
.input-field { width: 100%; border-radius: 8px; font-size: 14px; padding: 10px 14px; margin-bottom: 12px; outline: none; display: block; border: 1px solid; }
.label { font-size: 13px; display: block; margin-bottom: 6px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
.modal { border-radius: 16px; border: 1px solid; padding: 28px 24px; max-width: 380px; width: 100%; text-align: center; }
.page { display: none; }
.page.active { display: block; }
.spinner { width: 40px; height: 40px; border: 3px solid #374151; border-top-color: #4ade80; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.star { font-size: 22px; cursor: pointer; color: #9ca3af; }
.star.active { color: #facc15; }
.comment-card { border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
.empty-state { text-align: center; padding: 48px 20px; border-radius: 14px; border: 1px dashed; }
.dots-menu { position: relative; }
.dots-btn { border: none; border-radius: 8px; width: 34px; height: 34px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
.dots-dropdown { position: absolute; left: 0; top: calc(100% + 6px); border-radius: 10px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.15); min-width: 150px; display: none; z-index: 50; border: 1px solid; }
.dots-dropdown.open { display: block; }
.dots-item { display: flex; align-items: center; gap: 8px; width: 100%; padding: 11px 16px; background: none; border: none; cursor: pointer; font-size: 14px; text-align: right; font-family: inherit; }
.dots-item.danger { color: #f87171; }
.search-bar { margin-bottom: 16px; }
.search-input { width: 100%; border-radius: 10px; font-size: 15px; padding: 12px 16px; outline: none; border: 1px solid; }
.wakelock-btn { border-radius: 8px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid; background: none; }
.heart-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px; }
.theme-toggle { background: none; border: 1px solid; border-radius: 20px; padding: 5px 12px; cursor: pointer; font-size: 16px; }
body.dark .theme-toggle { border-color: #374151; color: #f9fafb; }
body.light .theme-toggle { border-color: #d1d5db; color: #374151; }

.diff-btn.selected { background: #4ade80 !important; color: #000 !important; border-color: #4ade80 !important; }
.notif-bell { position: relative; background: none; border: 1px solid; border-radius: 20px; padding: 5px 10px; cursor: pointer; font-size: 16px; }
body.dark .notif-bell { border-color: #374151; color: #f9fafb; }
body.light .notif-bell { border-color: #d1d5db; color: #374151; }
.notif-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: #fff; font-size: 10px; font-weight: 700; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
.notif-panel { position: fixed; top: 60px; left: 16px; right: 16px; max-width: 420px; margin: 0 auto; border-radius: 16px; border: 1px solid; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-height: 70vh; overflow-y: auto; display: none; }
.notif-panel.open { display: block; }
.notif-header { padding: 16px 20px; font-weight: 700; font-size: 16px; border-bottom: 1px solid; }
body.dark .notif-header { border-bottom-color: #374151; }
body.light .notif-header { border-bottom-color: #e5e7eb; }
.notif-wrapper { position: relative; overflow: hidden; border-bottom: 1px solid; }
.notif-item { padding: 14px 20px; cursor: pointer; background: inherit; transition: transform 0.3s ease; touch-action: pan-y; display: block; }
.notif-item.unread { border-right: 3px solid #4ade80; }
.notif-delete-btn { position: absolute; left: 0; top: 0; bottom: 0; width: 75px; background: #dc2626; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; cursor: pointer; border: none; gap: 4px; }

/* CLOCK */
.clock-bar { text-align: center; padding: 10px 20px; border-bottom: 1px solid; }
.clock-time { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
.clock-date { font-size: 12px; margin-top: 2px; }

/* HOME GRID */
.home-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; align-items: start; }

/* UPDATE CARDS */

.update-card-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #4ade80; }

.update-edit-btn { position: absolute; top: 8px; left: 8px; background: none; border: none; cursor: pointer; font-size: 13px; opacity: 0.5; }

/* AUTH MODAL */
.auth-box { border-radius: 16px; border: 1px solid; padding: 24px; max-width: 380px; width: 100%; }

.divider-line { flex: 1; height: 1px; }
body.dark .divider-line { background: #374151; }
body.light .divider-line { background: #e5e7eb; }
.divider-text { font-size: 13px; color: #6b7280; }

// CLOCK
function updateClock(){
  var now=new Date();
  var h=String(now.getHours()).padStart(2,'0');
  var m=String(now.getMinutes()).padStart(2,'0');
  var s=String(now.getSeconds()).padStart(2,'0');
  var ct=document.getElementById("clockTime");
  var cl=document.getElementById("clockDateLatin");
  var ch=document.getElementById("clockDateHebrew");
  if(ct)ct.textContent=h+":"+m+":"+s;
  if(cl)cl.textContent=now.toLocaleDateString("he-IL",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  if(ch){try{ch.textContent=now.toLocaleDateString("he-IL-u-ca-hebrew",{weekday:"long",year:"numeric",month:"long",day:"numeric"});}catch(e){}}
}
updateClock();
setInterval(updateClock,1000);

// THEME
var savedTheme=localStorage.getItem("theme")||"dark";
document.body.className=savedTheme;
document.getElementById("themeBtn").textContent=savedTheme==="dark"?"🌙":"☀️";
function toggleTheme(){
  var isDark=document.body.classList.contains("dark");
  document.body.className=isDark?"light":"dark";
  document.getElementById("themeBtn").textContent=isDark?"☀️":"🌙";
  localStorage.setItem("theme",isDark?"light":"dark");
}

function showPage(id){

async function sendTelegram(msg){

async function addNotification(type,message,catId,recipeId){
  try{
    await db.collection("notifications").add({type:type,message:message,catId:catId,recipeId:recipeId,read:false,createdAt:firebase.firestore.FieldValue.serverTimestamp()});

function listenNotifications(){
  document.getElementById("notifBtn").style.display="block";
  if(unsubNotif)unsubNotif();
  unsubNotif=db.collection("notifications").orderBy("createdAt","desc").onSnapshot(function(snap){
    notifications=[];
    snap.forEach(function(d){notifications.push(Object.assign({id:d.id},d.data()));});
    var unread=notifications.filter(function(n){return !n.read;}).length;
    var badge=document.getElementById("notifBadge");
    badge.textContent=unread;badge.style.display=unread>0?"flex":"none";
    renderNotifList();
  });
}

function renderNotifList(){
  var el=document.getElementById("notifList");
  if(!notifications.length){el.innerHTML='<div class="notif-empty">אין התראות עדיין</div>';return;}
  el.innerHTML=notifications.slice(0,30).map(function(n){
    var date=n.createdAt&&n.createdAt.toDate?n.createdAt.toDate().toLocaleDateString("he-IL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"";
    return '<div class="notif-wrapper"><button class="notif-delete-btn" onclick="deleteNotif(\''+n.id+'\')">🗑️<br>מחק</button><div class="notif-item '+(n.read?'':'unread')+'" id="notif-'+n.id+'"><div style="font-size:14px;margin-bottom:4px" onclick="goToNotif(\''+n.id+'\',\''+n.catId+'\',\''+n.recipeId+'\')">'+n.message+'</div><div style="font-size:12px;color:#6b7280">'+date+'</div></div></div>';
  }).join("");
  notifications.slice(0,30).forEach(function(n){
    var item=document.getElementById("notif-"+n.id);
    if(!item)return;
    var startX=0;
    item.addEventListener("touchstart",function(e){startX=e.touches[0].clientX;},{passive:true});
    item.addEventListener("touchmove",function(e){var diff=startX-e.touches[0].clientX;if(diff>10)item.style.transform="translateX(-"+Math.min(diff,75)+"px)";else if(diff<-5)item.style.transform="translateX(0)";},{passive:true});
    item.addEventListener("touchend",function(){var x=Math.abs(parseFloat(item.style.transform.replace(/[^\d.-]/g,""))||0);item.style.transform=x>40?"translateX(-75px)":"translateX(0)";});
  });
}

function deleteNotif(id){
  db.collection("notifications").doc(id).delete().then(function(){
    notifications=notifications.filter(function(n){return n.id!==id;});
    var unread=notifications.filter(function(n){return !n.read;}).length;
    var badge=document.getElementById("notifBadge");
    badge.textContent=unread;badge.style.display=unread>0?"flex":"none";
    renderNotifList();
  });
}
function goToNotif(id,catId,recipeId){db.collection("notifications").doc(id).update({read:true});document.getElementById("notifPanel").classList.remove("open");currentCategory=catId;showRecipe(recipeId);}

async function loadFavorites(){

async function toggleFavorite(recipeId,catId,recipeName){
  if(!currentUser){alert("יש להתחבר כדי לשמור מועדפים");return;}
  var isFav=userFavorites.some(function(f){return f.id===recipeId;});
  userFavorites=isFav?userFavorites.filter(function(f){return f.id!==recipeId;}):userFavorites.concat([{id:recipeId,cat:catId}]);
  await db.collection("favorites").doc(currentUser.uid).set({list:userFavorites});
  if(!isFav&&recipeName)await addNotification("like","❤️ "+(currentUser.displayName||currentUser.email||"מישהו")+" אהב את \""+recipeName+"\"",catId,recipeId);
  return !isFav;
}

function toggleAuthMode(){
  isRegisterMode=!isRegisterMode;
  document.getElementById("nameFieldWrap").style.display=isRegisterMode?"block":"none";
  document.getElementById("emailAuthBtn").textContent=isRegisterMode?"הרשמה":"כניסה";

}

function handleEmailAuth(){
  var email=document.getElementById("emailInput").value.trim();
  var password=document.getElementById("passwordInput").value.trim();
  if(!email||!password){alert("נא למלא אימייל וסיסמא");return;}
  if(isRegisterMode){
    var name=document.getElementById("nameInput").value.trim()||"משתמש";
    auth.createUserWithEmailAndPassword(email,password).then(function(result){
      return result.user.updateProfile({displayName:name});
    }).catch(function(e){alert("שגיאה: "+e.message);});
  }else{
    auth.signInWithEmailAndPassword(email,password).catch(function(e){
      if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password")alert("אימייל או סיסמא שגויים");
      else alert("שגיאה: "+e.message);
    });

function signInWithGoogle(){
  var p=new firebase.auth.GoogleAuthProvider();
  p.setCustomParameters({prompt:"select_account"});
  auth.signInWithPopup(p).catch(function(e){if(e.code!=="auth/popup-closed-by-user"&&e.code!=="auth/cancelled-popup-request")alert("שגיאה: "+e.message);});
}

function debouncedSearch(val){clearTimeout(searchTimer);if(!val.trim())return;searchTimer=setTimeout(function(){handleSearch(val);},1200);}

function handleSearch(val){
  var term=val.trim().toLowerCase();
  var results=allRecipes.filter(function(r){return(r.name||"").toLowerCase().includes(term)||(r.ingredients||"").toLowerCase().includes(term)||(r.instructions||"").toLowerCase().includes(term);});
  document.getElementById("backBtn").style.display="block";backFn=showHome;
  var el=document.getElementById("searchPage");
  el.innerHTML='<div class="search-bar"><input class="search-input" placeholder="🔍 חפש מתכון..." id="searchInput2" dir="rtl" value="'+val+'" oninput="debouncedSearch(this.value)"></div><p class="sub-text" style="font-size:14px;margin-bottom:16px">חיפשת: "<strong>'+val+'</strong>" — '+results.length+' תוצאות</p>'+
    (results.length===0?'<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">🔍</div><p class="sub-text">לא נמצאו מתכונים</p></div>':
      results.map(function(r){var cat=CATEGORIES.find(function(c){return c.id===r.catId;});return'<div style="background:'+getCatBg(cat)+';border-radius:12px;padding:14px;border:1px solid '+cat.color+'44;margin-bottom:10px;cursor:pointer" onclick="currentCategory=\''+r.catId+'\';showRecipe(\''+r.id+'\')"><div style="font-weight:600">'+r.name+'</div><div style="color:'+cat.color+';font-size:12px;margin-top:4px">'+cat.label+'</div></div>';}).join(""));
  showPage("searchPage");
  var inp2=document.getElementById("searchInput2");
  if(inp2){inp2.focus();inp2.setSelectionRange(inp2.value.length,inp2.value.length);}
}

    '<h3 style="font-size:18px;font-family:\'David\',serif;margin-bottom:20px">💬 תגובות</h3>'+
    (comments.length===0?'<p class="sub-text" style="font-size:14px;margin-bottom:16px">עדיין אין תגובות.</p>':
      comments.map(function(c,i){return'<div class="comment-card" style="border-right:3px solid '+cat.color+'"><div style="display:flex;justify-content:space-between;margin-bottom:6px;align-items:center"><span style="color:'+cat.color+';font-weight:600">'+c.user+'</span><div style="display:flex;align-items:center;gap:8px"><span style="color:#facc15">'+'★'.repeat(c.rating)+'☆'.repeat(5-c.rating)+'</span>'+(isAdmin?'<button onclick="deleteComment(\''+recipeId+'\','+i+')" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:16px">🗑️</button>':'')+'</div></div><p class="recipe-text" style="font-size:14px">'+c.text+'</p></div>';}).join(""))+
    '<div style="padding-top:20px;margin-top:8px;border-top:1px solid #374151">'+
    '<input id="commentUser" class="input-field" placeholder="השם שלך (אופציונלי)" dir="rtl">'+
    '<textarea id="commentText" class="input-field" placeholder="כתוב תגובה..." rows="3" style="resize:vertical;height:80px" dir="rtl"></textarea>'+
    '<div style="display:flex;align-items:center;justify-content:space-between">'+
    '<div style="display:flex;gap:4px;direction:ltr">'+[1,2,3,4,5].map(function(s){return'<span class="star" data-star="'+s+'" onclick="setRating('+s+')">★</span>';}).join("")+'</div>'+
    '<button class="btn btn-primary" onclick="submitComment(\''+recipeId+'\',\''+recipe.name.replace(/'/g,"\\'")+'\')">שלח תגובה</button>'+
    '</div></div></div>';
  showPage("recipePage");
}

async function handleRecipeHeart(recipeId,catId,recipeName){var isFav=await toggleFavorite(recipeId,catId,recipeName);var btn=document.getElementById("recipeHeart");if(btn)btn.textContent=isFav?'❤️':'🤍';}

function shareWhatsapp(recipeId){
  var url=SITE_URL+"?cat="+currentCategory+"&recipe="+recipeId;
  var text="בוא תראה את המתכון \""+currentRecipe.name+"\" בספר המתכונים של גיא שלומי! 🍽️\n"+url;
  window.open("https://wa.me/?text="+encodeURIComponent(text),'_blank');
}

async function toggleWakeLock(){if(wakeLock){await releaseWakeLock();}else{await requestWakeLock();}var btn=document.getElementById("wakeBtn");if(btn){btn.className="wakelock-btn"+(wakeLock?' active':'');btn.textContent=wakeLock?'🔆 דולק':'💡 שמור דולק';}}

function setRating(n){selectedRating=n;document.querySelectorAll(".star").forEach(function(s){s.classList.toggle("active",parseInt(s.dataset.star)<=n);});}

async function submitComment(recipeId,recipeName){
  var text=document.getElementById("commentText").value.trim();
  if(!text||selectedRating===0){alert("נא למלא תגובה ודירוג");return;}
  var user=document.getElementById("commentUser").value.trim()||(currentUser&&(currentUser.displayName||currentUser.email))||"אנונימי";
  var comments=(currentRecipe.comments||[]).concat([{user:user,text:text,rating:selectedRating}]);
  await db.collection(currentCategory).doc(recipeId).update({comments:comments});
  await addNotification("comment","💬 "+user+" הגיב על \""+recipeName+"\": \""+text.slice(0,40)+"\" ⭐"+selectedRating,currentCategory,recipeId);
  currentRecipe.comments=comments;selectedRating=0;showRecipe(recipeId);
}

async function deleteComment(recipeId,index){
  if(!confirm("האם אתה בטוח שברצונך למחוק תגובה זו?"))return;
  var comments=(currentRecipe.comments||[]).slice();comments.splice(index,1);
  await db.collection(currentCategory).doc(recipeId).update({comments:comments});
  currentRecipe.comments=comments;showRecipe(recipeId);
}

async function showForm(recipeId){
  var cat=CATEGORIES.find(function(c){return c.id===currentCategory;});
  var editingRecipe=null,name="",ingredients="",instructions="";
  if(recipeId){var d=await db.collection(currentCategory).doc(recipeId).get();if(d.exists){editingRecipe=Object.assign({id:d.id},d.data());name=editingRecipe.name;ingredients=editingRecipe.ingredients;instructions=editingRecipe.instructions;}}
  var savedDiff=editingRecipe&&editingRecipe.difficulty?editingRecipe.difficulty:"";
  backFn=function(){showCategory(currentCategory);};
  document.getElementById("formPage").innerHTML='<div class="recipe-card" style="border-radius:16px;border:1px solid '+cat.color+'55;padding:24px">'+
    '<h2 style="color:'+cat.color+';font-family:\'David\',serif;font-size:22px;margin-bottom:20px">'+(recipeId?"✏️ עריכת מתכון":"✍️ הוספת מתכון חדש")+'</h2>'+
    '<label class="label">שם המתכון *</label><input id="fName" class="input-field" value="'+name+'" placeholder="לדוג׳: פסטה בולונז" dir="rtl">'+
    '<div style="display:flex;gap:12px;margin-bottom:12px"><div style="flex:1"><label class="label">⏱️ זמן הכנה</label><input id="fTime" class="input-field" value="'+(editingRecipe&&editingRecipe.cookTime?editingRecipe.cookTime:'')+'" placeholder="למשל: 30 דק׳" dir="rtl" style="margin-bottom:0"></div>'+
    '<div style="flex:1"><label class="label">רמת קושי</label><div style="display:flex;gap:6px;margin-top:4px">'+["קל 🟢","בינוני 🟡","קשה 🔴"].map(function(d){return'<button type="button" class="diff-btn'+(savedDiff===d?' selected':'')+'" data-diff="'+d+'" onclick="selectDiff(this)">'+d+'</button>';}).join('')+'</div></div></div>'+
    '<label class="label">מצרכים *</label><textarea id="fIngredients" class="input-field" placeholder="ציין את כל המצרכים..." rows="4" style="height:100px;resize:vertical" dir="rtl">'+ingredients+'</textarea>'+
    '<label class="label">אופן הכנה *</label><textarea id="fInstructions" class="input-field" placeholder="תאר את שלבי ההכנה..." rows="5" style="height:130px;resize:vertical" dir="rtl">'+instructions+'</textarea>'+
    '<button class="btn btn-primary" onclick="saveRecipe(\''+(recipeId||"")+'\''+')" style="width:100%;padding:14px;font-size:16px;border-radius:10px;margin-top:4px">💾 '+(recipeId?"שמור שינויים":"שמור מתכון")+'</button></div>';
  showPage("formPage");
}

function selectDiff(btn){document.querySelectorAll(".diff-btn").forEach(function(b){b.classList.remove("selected");});btn.classList.add("selected");}

async function saveRecipe(recipeId){
  var name=document.getElementById("fName").value.trim();
  var ingredients=document.getElementById("fIngredients").value.trim();
  var instructions=document.getElementById("fInstructions").value.trim();
  var cookTime=document.getElementById("fTime").value.trim();
  var diffBtn=document.querySelector(".diff-btn.selected");
  var difficulty=diffBtn?diffBtn.dataset.diff:"";
  if(!name||!ingredients||!instructions){alert("נא למלא את כל השדות");return;}
  var data={name:name,ingredients:ingredients,instructions:instructions,cookTime:cookTime,difficulty:difficulty};
  if(recipeId){await db.collection(currentCategory).doc(recipeId).update(data);}
  else{await db.collection(currentCategory).add(Object.assign(data,{comments:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()}));}
  showCategory(currentCategory);
}

function openDeleteModal(id,name){deleteTargetId=id;document.getElementById("deleteRecipeName").textContent=name;document.getElementById("deleteModal").style.display="flex";}
function closeDeleteModal(){document.getElementById("deleteModal").style.display="none";deleteTargetId=null;}
async function confirmDelete(){await db.collection(currentCategory).doc(deleteTargetId).delete();closeDeleteModal();showCategory(currentCategory);}
</script>
</body>
</html>
