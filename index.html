  .header { padding: 14px 20px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 100; }
  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px; }
  .btn { border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity 0.2s; }

  .dots-btn { border: none; border-radius: 8px; width: 34px; height: 34px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
  .dots-dropdown { position: absolute; left: 0; top: calc(100% + 6px); border-radius: 10px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.15); min-width: 150px; display: none; z-index: 50; border: 1px solid; }
  .dots-dropdown.open { display: block; }
  .dots-item { display: flex; align-items: center; gap: 8px; width: 100%; padding: 11px 16px; background: none; border: none; cursor: pointer; font-size: 14px; text-align: right; font-family: inherit; transition: background 0.15s; }

  .dots-item.danger:hover { background: rgba(248,113,113,0.1) !important; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, addDoc, updateDoc, deleteDoc,
  orderBy, query, setDoc, getDoc, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXUxSpdJO052huhnyEPSOAlWYV4Ti9Tyk",
  authDomain: "chef-guy-shlomi.firebaseapp.com",
  projectId: "chef-guy-shlomi",
  storageBucket: "chef-guy-shlomi.firebasestorage.app",
  messagingSenderId: "125665332795",
  appId: "1:125665332795:web:95c022300e37aa8ec9961e"
};

const TELEGRAM_TOKEN = "8786680475:AAFXx_UFWY8upN-n6htpv1B-QiULM4FQBV4";
const TELEGRAM_CHAT_ID = "43583668";

async function sendTelegram(message) {
  try {
    await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "HTML" })
    });
  } catch(e) {}
}
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null, isAdmin = false, isViewOnly = false;
let currentCategory = null, currentRecipe = null, deleteTargetId = null;
let selectedRating = 0, userFavorites = [], wakeLock = null, allRecipes = [];
let searchTimer = null, notifications = [], unsubNotif = null;

const CATEGORIES = [
  { id: "salads", label: "🥗 סלטים", color: "#16a34a", darkBg: "#052e16", lightBg: "#dcfce7" },
  { id: "sides", label: "🍚 תוספות", color: "#ca8a04", darkBg: "#1c1400", lightBg: "#fef9c3" },
  { id: "soups", label: "🍲 מרקים", color: "#7c3aed", darkBg: "#1a0938", lightBg: "#ede9fe" },
  { id: "pastry", label: "🥐 מאפים חלבי/בשרי", color: "#ea580c", darkBg: "#2d1000", lightBg: "#ffedd5" },
  { id: "meat", label: "🥩 בשר ועוף", color: "#dc2626", darkBg: "#2d0000", lightBg: "#fee2e2" },
  { id: "fish", label: "🐟 דגים", color: "#0284c7", darkBg: "#001d2e", lightBg: "#e0f2fe" },
  { id: "desserts", label: "🍰 קינוחים", color: "#db2777", darkBg: "#2d0018", lightBg: "#fce7f3" },
];

function getCatBg(cat) { return document.body.classList.contains("light") ? cat.lightBg : cat.darkBg; }

// THEME
const savedTheme = localStorage.getItem("theme") || "dark";
document.body.className = savedTheme;
document.getElementById("themeBtn").textContent = savedTheme === "dark" ? "🌙" : "☀️";
window.toggleTheme = () => {
  const isDark = document.body.classList.contains("dark");
  document.body.className = isDark ? "light" : "dark";
  document.getElementById("themeBtn").textContent = isDark ? "☀️" : "🌙";
  localStorage.setItem("theme", isDark ? "light" : "dark");
};

// DEEP LINK — פתיחת מתכון ישירות מקישור
function checkDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get("cat");
  const recipe = params.get("recipe");
  if (cat && recipe) {
    currentCategory = cat;
    window.showRecipe(recipe);
    return true;
  }
  return false;
}

// WAKE LOCK
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); return true; } } catch(e) {}
  return false;
}
async function releaseWakeLock() { if (wakeLock) { await wakeLock.release(); wakeLock = null; } }

// FAVORITES
async function loadFavorites() {
  if (!currentUser) { userFavorites = []; return; }
  try {
    const d = await getDoc(doc(db, "favorites", currentUser.uid));
    userFavorites = d.exists() ? (d.data().list || []) : [];
  } catch(e) { userFavorites = []; }
}

async function toggleFavorite(recipeId, catId, recipeName) {
  if (!currentUser) { alert("יש להתחבר כדי לשמור מועדפים"); return; }
  const isFav = userFavorites.some(f => f.id === recipeId);
  userFavorites = isFav ? userFavorites.filter(f => f.id !== recipeId) : [...userFavorites, { id: recipeId, cat: catId }];
  await setDoc(doc(db, "favorites", currentUser.uid), { list: userFavorites });
  if (!isFav) {
    await addNotification("like", `❤️ ${currentUser.displayName || "מישהו"} אהב את המתכון "${recipeName}"`, catId, recipeId);
  }
  return !isFav;
}

// NOTIFICATIONS
async function addNotification(type, message, catId, recipeId) {
  try {
    await addDoc(collection(db, "notifications"), {
      type, message, catId, recipeId,
      read: false,
      createdAt: serverTimestamp()
    });
    // שלח ל-Telegram
    const cat = CATEGORIES.find(c => c.id === catId);
    const siteUrl = `https://neon-torte-844912.netlify.app?cat=${catId}&recipe=${recipeId}`;
    await sendTelegram(`🍽️ <b>ספר המתכונים</b>\n\n${message}\n\n<a href="${siteUrl}">לחץ לצפייה במתכון</a>`);
  } catch(e) {}
}

function listenNotifications() {
  if (!isAdmin) return;
  document.getElementById("notifBtn").style.display = "block";
  if (unsubNotif) unsubNotif();
  unsubNotif = onSnapshot(
    query(collection(db, "notifications"), orderBy("createdAt", "desc")),
    (snap) => {
      notifications = [];
      snap.forEach(d => notifications.push({ id: d.id, ...d.data() }));
      const unread = notifications.filter(n => !n.read).length;
      const badge = document.getElementById("notifBadge");
      badge.textContent = unread;
      badge.style.display = unread > 0 ? "flex" : "none";
      renderNotifList();
    }
  );
}

function renderNotifList() {
  const el = document.getElementById("notifList");
  if (!notifications.length) { el.innerHTML = `<div class="notif-empty">אין התראות עדיין</div>`; return; }
  el.innerHTML = notifications.slice(0, 30).map(n => {
    const date = n.createdAt?.toDate ? n.createdAt.toDate().toLocaleDateString("he-IL", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" }) : "";
    return `<div class="notif-item ${n.read?'':'unread'}" onclick="goToNotif('${n.id}','${n.catId}','${n.recipeId}')">
      <div style="font-size:14px;margin-bottom:4px">${n.message}</div>
      <div style="font-size:12px;color:#6b7280">${date}</div>
    </div>`;
  }).join("");
}

window.goToNotif = async (notifId, catId, recipeId) => {
  await updateDoc(doc(db, "notifications", notifId), { read: true });
  document.getElementById("notifPanel").classList.remove("open");
  currentCategory = catId;
  window.showRecipe(recipeId);
};

window.markAllRead = async () => {
  const unread = notifications.filter(n => !n.read);
  const promises = unread.map(n => updateDoc(doc(db, "notifications", n.id), { read: true }));
  await Promise.all(promises);
  notifications = notifications.map(n => ({ ...n, read: true }));
  document.getElementById("notifBadge").style.display = "none";
  renderNotifList();
};

window.toggleNotifPanel = () => {
  document.getElementById("notifPanel").classList.toggle("open");
};

// Request Push permission for admin
async function requestPushPermission() {
  if (!isAdmin) return;
  if (Notification.permission === "default") {
    await Notification.requestPermission();
  }
}

// AUTH
window.signInWithGoogle = async () => {
  try {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });
    await signInWithPopup(auth, provider);
  } catch(e) {
    if (e.code !== "auth/popup-closed-by-user" && e.code !== "auth/cancelled-popup-request") {
      alert("שגיאה: " + e.message);
    }
  }
};

window.viewOnly = () => { isViewOnly = true; if (!checkDeepLink()) showHome(); };

window.signOutUser = async () => {
  if (unsubNotif) unsubNotif();
  await signOut(auth);
  isViewOnly = false; isAdmin = false; userFavorites = [];
  document.getElementById("notifBtn").style.display = "none";
  showPage("loginPage");
  document.getElementById("logoutBtn").style.display = "none";
  document.getElementById("headerSub").textContent = "";
};

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user && user.uid === ADMIN_UID) {
    isAdmin = true; isViewOnly = false;
    document.getElementById("logoutBtn").style.display = "block";
    document.getElementById("logoutBtn").onclick = window.signOutUser;
    document.getElementById("headerSub").textContent = "מנהל: " + user.displayName;
    await loadFavorites();
    listenNotifications();
    requestPushPermission();
    if (!checkDeepLink()) showHome();
  } else if (user) {
    isAdmin = false; isViewOnly = false;
    document.getElementById("logoutBtn").style.display = "block";
    document.getElementById("logoutBtn").onclick = window.signOutUser;
    document.getElementById("headerSub").textContent = user.displayName;
    await loadFavorites();
    if (!checkDeepLink()) showHome();
  } else {
    if (!isViewOnly) showPage("loginPage");
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("notifBtn").style.display = "none";
  }
});

function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.getElementById("notifPanel").classList.remove("open");
}

async function loadAllRecipes() {
  allRecipes = [];
  for (const cat of CATEGORIES) {
    const snap = await getDocs(collection(db, cat.id));
    snap.forEach(d => allRecipes.push({ id: d.id, catId: cat.id, ...d.data() }));
  }
}

// SEARCH
window.debouncedSearch = (val) => {
  clearTimeout(searchTimer);
  if (!val.trim()) return;
  searchTimer = setTimeout(() => handleSearch(val), 1200);
};

window.handleSearch = (val) => {
  if (!val.trim()) return;
  const term = val.trim().toLowerCase();
  const results = allRecipes.filter(r =>
    r.name?.toLowerCase().includes(term) ||
    r.ingredients?.toLowerCase().includes(term) ||
    r.instructions?.toLowerCase().includes(term)
  );
  document.getElementById("backBtn").style.display = "block";
  document.getElementById("backBtn").onclick = showHome;
  const el = document.getElementById("searchPage");
  el.innerHTML = `
    <div class="search-bar" style="margin-bottom:16px">
      <input class="search-input" placeholder="🔍 חפש מתכון..." id="searchInput2" dir="rtl" value="${val}" oninput="debouncedSearch(this.value)">
    </div>
    <p class="sub-text" style="font-size:14px;margin-bottom:20px">חיפשת: "<strong>${val}</strong>" — ${results.length} תוצאות</p>
    ${results.length === 0 ? `<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">🔍</div><p class="sub-text">לא נמצאו מתכונים</p></div>` :
      results.map(r => {
        const cat = CATEGORIES.find(c => c.id === r.catId);
        return `<div style="background:${getCatBg(cat)};border-radius:12px;padding:16px;border:1px solid ${cat.color}44;margin-bottom:12px;cursor:pointer" onclick="currentCategory='${r.catId}';showRecipe('${r.id}')">
          <div style="font-weight:600;font-size:16px">${r.name}</div>
          <div style="color:${cat.color};font-size:12px;margin-top:4px">${cat.label}</div>
        </div>`;
      }).join("")}
  `;
  showPage("searchPage");
  const inp2 = document.getElementById("searchInput2");
  if (inp2) { inp2.focus(); inp2.setSelectionRange(inp2.value.length, inp2.value.length); }
};

window.shareWhatsapp = (recipeId) => {
  const base = window.location.origin + window.location.pathname;
  const url = `${base}?cat=${currentCategory}&recipe=${recipeId}`;
  const text = `בוא תראה את המתכון "${currentRecipe.name}" בספר המתכונים של גיא שלומי! 🍽️\n${url}`;

window.toggleWakeLock = async () => {
  if (wakeLock) { await releaseWakeLock(); } else { await requestWakeLock(); }
  const btn = document.getElementById("wakeBtn");
  if (btn) { btn.className = `wakelock-btn ${wakeLock?'active':''}`; btn.textContent = wakeLock ? '🔆 דולק' : '💡 שמור דולק'; }
};

window.setRating = (n) => {
  selectedRating = n;
  document.querySelectorAll(".star").forEach(s => s.classList.toggle("active", parseInt(s.dataset.star) <= n));
};

window.submitComment = async (recipeId, recipeName) => {
  const text = document.getElementById("commentText").value.trim();
  if (!text || selectedRating === 0) { alert("נא למלא תגובה ודירוג"); return; }
  const user = document.getElementById("commentUser").value.trim() || "אנונימי";
  const comments = [...(currentRecipe.comments||[]), { user, text, rating: selectedRating }];
  await updateDoc(doc(db, currentCategory, recipeId), { comments });
  await addNotification("comment", `💬 ${user} הגיב על "${recipeName}": "${text.slice(0,40)}${text.length>40?'...':''}" ⭐${selectedRating}`, currentCategory, recipeId);
  currentRecipe.comments = comments; selectedRating = 0;
  window.showRecipe(recipeId);
};

      <div style="display:flex;gap:12px;margin-bottom:12px">
        <div style="flex:1">
          <label class="label">⏱️ זמן הכנה</label>
          <input id="fTime" class="input-field" value="${editingRecipe?.cookTime||''}" placeholder="למשל: 30 דק׳" dir="rtl" style="margin-bottom:0">
        </div>
        <div style="flex:1">
          <label class="label">רמת קושי</label>
          <div style="display:flex;gap:6px;margin-top:4px">
            ${["קל 🟢","בינוני 🟡","קשה 🔴"].map(d => `
              <button type="button" class="diff-btn ${savedDiff===d?'selected':''}" data-diff="${d}" onclick="selectDiff(this)">
                ${d}
              </button>`).join('')}
          </div>
        </div>
      </div>
      <label class="label">מצרכים *</label>
      <textarea id="fIngredients" class="input-field" placeholder="ציין את כל המצרכים..." rows="4" style="height:100px;resize:vertical" dir="rtl">${ingredients}</textarea>
      <label class="label">אופן הכנה *</label>
      <textarea id="fInstructions" class="input-field" placeholder="תאר את שלבי ההכנה..." rows="5" style="height:130px;resize:vertical" dir="rtl">${instructions}</textarea>
      <button class="btn btn-primary" onclick="saveRecipe('${recipeId||""}')" style="width:100%;padding:14px;font-size:16px;border-radius:10px;margin-top:4px">
        💾 ${recipeId ? "שמור שינויים" : "שמור מתכון"}
      </button>
    </div>
  `;
  showPage("formPage");
};

window.selectDiff = (btn) => {
  document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
};

window.saveRecipe = async (recipeId) => {
  const name = document.getElementById("fName").value.trim();
  const ingredients = document.getElementById("fIngredients").value.trim();
  const instructions = document.getElementById("fInstructions").value.trim();
  const cookTime = document.getElementById("fTime").value.trim();
  const diffBtn = document.querySelector(".diff-btn.selected");
  const difficulty = diffBtn ? diffBtn.dataset.diff : "";
  if (!name || !ingredients || !instructions) { alert("נא למלא את כל השדות"); return; }
  const data = { name, ingredients, instructions, cookTime, difficulty };
  if (recipeId) {
    await updateDoc(doc(db, currentCategory, recipeId), data);
  } else {
    await addDoc(collection(db, currentCategory), { ...data, comments: [], createdAt: Date.now() });
  }
  window.showCategory(currentCategory);
};

window.openDeleteModal = (id, name) => {
  deleteTargetId = id;
  document.getElementById("deleteRecipeName").textContent = name;
  document.getElementById("deleteModal").style.display = "flex";
};
window.closeDeleteModal = () => { document.getElementById("deleteModal").style.display = "none"; deleteTargetId = null; };
window.confirmDelete = async () => {
  await deleteDoc(doc(db, currentCategory, deleteTargetId));
  window.closeDeleteModal(); window.showCategory(currentCategory);
};


</script>
</body>
</html>
